services:
  - type: web
    name: bolsheelxovskiy-appeals-api
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: DATABASE_URL
        fromDatabase:
          name: bolsheelxovskiy-appeals-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://bolsheelxovskiy-appeals-site.onrender.com,https://bolsheelxovskiy-syte.onrender.com,http://localhost:5500,http://127.0.0.1:5500
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: admin123
      - key: ADMIN_FULL_NAME
        value: Администратор системы
      - key: MANAGER_USERNAME
        value: manager
      - key: MANAGER_PASSWORD
        value: manager123
      - key: MANAGER_FULL_NAME
        value: Руководитель администрации
      - key: EMPLOYEE_USERNAME
        value: employee
      - key: EMPLOYEE_PASSWORD
        value: employee123
      - key: EMPLOYEE_FULL_NAME
        value: Сотрудник администрации
    disk:
      name: appeals-uploads
      mountPath: /opt/render/project/src/backend/uploads
      sizeGB: 1

  - type: web
    name: bolsheelxovskiy-appeals-site
    env: static
    plan: free
    rootDir: frontend
    buildCommand: ''
    staticPublishPath: .
    autoDeploy: true

# PostgreSQL-база для CRM и обращений
databases:
  - name: bolsheelxovskiy-appeals-db
    plan: free
    databaseName: appeals_db
    user: appeals_user
